<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #f9f9f9;
            --border: #000000;
        }
        body {
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            background-color: var(--bg);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0; padding: 10px;
            display: flex; justify-content: center;
        }
        /* 主題顏色變換 */
        body.theme-320 { background-color: #2d3436; color: #fdcb6e; --border: #fdcb6e; }
        body.theme-321 { background-color: #e8f5e9; color: #2d3436; --border: #2ecc71; }
        body.theme-both { background-color: #fff0f3; color: #d63031; --border: #ff7675; }

        .container {
            max-width: 480px; width: 100%;
            background: #ffffff; border: 6px solid #000;
            border-radius: 24px; padding: 20px;
            box-shadow: 12px 12px 0px #000;
            color: #000; box-sizing: border-box;
        }
        .theme-320 .container { background: #1e272e; color: #fdcb6e; box-shadow: 12px 12px 0px #fdcb6e; border-color: #fdcb6e;}
        .theme-321 .container { background: #ffffff; color: #1b5e20; box-shadow: 12px 12px 0px #2ecc71; border-color: #2ecc71;}
        .theme-both .container { background: #ffffff; color: #c0392b; box-shadow: 12px 12px 0px #ff7675; border-color: #ff7675;}

        h1 { text-align: center; font-size: 1.6rem; margin: 10px 0 20px 0; line-height: 1.4; border-bottom: 5px solid var(--border); padding-bottom: 10px; font-weight: 900; }
        
        /* EDM 樣式優化 */
        .edm-container { display: flex; flex-direction: column; gap: 20px; margin-bottom: 25px; }
        .edm-card {
            position: relative; border: 5px solid #000;
            border-radius: 18px; overflow: hidden; cursor: pointer;
            transition: all 0.2s; background: #eee; min-height: 200px;
        }
        .edm-card.selected { transform: translateY(5px); box-shadow: none; border-color: #ff4757; }
        .edm-card img { width: 100%; height: auto; display: block; }
        
        .check-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: #fff; pointer-events: none;
        }
        .edm-card.selected .check-overlay { display: flex; }
        .big-check { font-size: 80px; font-weight: bold; color: #2ecc71; filter: drop-shadow(0 0 10px #000); }
        .price-tag { font-size: 24px; background: #ff4757; padding: 5px 15px; border-radius: 10px; margin-top: 5px; }

        .zoom-btn {
            position: absolute; bottom: 15px; right: 15px;
            background: #fff; border: 3px solid #000; border-radius: 12px;
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; z-index: 5; pointer-events: auto;
        }

        /* 輸入框與選擇框特別設計 */
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 1.2rem; }
        input[type="text"], input[type="email"], select {
            width: 100%; padding: 15px; border: 4px solid #000;
            border-radius: 12px; font-size: 1.1rem; box-sizing: border-box;
            background: #fff; font-weight: bold;
        }
        
        /* 自動金額按鈕 */
        .amt-box {
            background: #000; color: #fff; padding: 25px; border-radius: 15px;
            text-align: center; font-size: 2rem; font-weight: 900;
            margin: 20px 0; border: 4px solid var(--border);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        .submit-btn {
            width: 100%; padding: 22px; background: #ff4757; color: white;
            border: 5px solid #000; border-radius: 15px; font-size: 1.5rem;
            font-weight: 900; cursor: pointer; margin-top: 10px;
            box-shadow: 0 8px 0 #000; transition: all 0.1s;
        }
        .submit-btn:active { transform: translateY(8px); box-shadow: none; }
        .submit-btn:disabled { background: #95a5a6; cursor: not-allowed; }

        /* Modal 彈窗 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        .modal-content {
            background: #fff; color: #000; padding: 25px; border-radius: 25px;
            max-width: 420px; margin: 10px auto; position: relative; border: 6px solid #000;
        }
        .close-modal { position: absolute; top: 5px; right: 15px; font-size: 40px; cursor: pointer; font-weight: bold; }
        .remind-box { background: #ffeb3b; border: 4px solid #000; padding: 12px; margin: 15px 0; text-align: center; font-weight: 900; color: #d63031; font-size: 1.2rem; }
        .qr-code { width: 160px; height: 160px; margin: 10px auto; display: block; border: 3px solid #000; }
        .info-row { margin: 8px 0; font-size: 1.1rem; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
    </style>
</head>
<body class="theme-default">

<div class="container animate__animated animate__backInDown">
    <h1>寰宇新竹「線上直播」<br>報名網頁</h1>

    <div class="edm-container">
        <!-- 3/20 -->
        <div class="edm-card" id="card320" onclick="toggleSelection('3/20')">
            <!-- 使用 google drive 直接預覽連結 -->
            <img src="https://drive.google.com/thumbnail?id=1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH&sz=w800" alt="3/20 EDM">
            <div class="zoom-btn" onclick="zoomImg(event, '1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH')">🔍</div>
            <div class="check-overlay">
                <div class="big-check">✓</div>
                <div class="price-tag">$100</div>
            </div>
        </div>
        <!-- 3/21 -->
        <div class="edm-card" id="card321" onclick="toggleSelection('3/21')">
            <img src="https://drive.google.com/thumbnail?id=1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0&sz=w800" alt="3/21 EDM">
            <div class="zoom-btn" onclick="zoomImg(event, '1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0')">🔍</div>
            <div class="check-overlay">
                <div class="big-check">✓</div>
                <div class="price-tag">$100</div>
            </div>
        </div>
    </div>

    <form id="regForm">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" id="name" name="name" placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label>性別</label>
            <select name="gender">
                <option value="未提供">請選擇</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <label>介紹人</label>
            <input type="text" name="referrer">
        </div>
        <div class="form-group">
            <label>Email (必填，將發送通知信)</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label>居住縣市</label>
            <select name="city">
                <option value="北北基">北北基</option>
                <option value="桃竹苗" selected>桃竹苗</option>
                <option value="中彰投">中彰投</option>
                <option value="雲嘉南">雲嘉南</option>
                <option value="高屏">高屏</option>
                <option value="宜花東離島">宜花東離島</option>
                <option value="海外">海外</option>
            </select>
        </div>
        <div class="form-group">
            <label>年齡範圍</label>
            <select name="age">
                <option value="2001-2010">2001-2010</option>
                <option value="1991-2000">1991-2000</option>
                <option value="1981-1990">1981-1990</option>
                <option value="1971-1980">1971-1980</option>
                <option value="1961-1970">1961-1970</option>
                <option value="1960以前">1960以前</option>
            </select>
        </div>
        <div class="form-group">
            <label>身份別</label>
            <select name="identity">
                <option value="上班族">上班族</option>
                <option value="老闆">老闆</option>
                <option value="自由業">自由業</option>
                <option value="家庭主婦">家庭主婦</option>
                <option value="退休人士">退休人士</option>
            </select>
        </div>
        <div class="form-group">
            <label>繳費方式</label>
            <select name="payMethod" id="payMethod" onchange="toggleProxy()">
                <option value="本人Linepay繳費給窗口">本人Linepay繳費給窗口</option>
                <option value="請他人代繳">請他人代繳</option>
            </select>
        </div>
        <div class="form-group" id="proxyDiv" style="display:none">
            <label>代繳人姓名</label>
            <input type="text" name="payProxyName" id="payProxyName">
        </div>

        <label>自動計算金額</label>
        <div class="amt-box" id="amtDisplay">請選擇課程</div>
        
        <input type="hidden" name="amount" id="finalAmount" value="0">
        <input type="hidden" name="dates" id="selectedDatesInput" value="">

        <button type="button" class="submit-btn" id="submitBtn" onclick="submitForm()">送出報名+email通知我</button>
    </form>
</div>

<!-- 成功彈窗 -->
<div id="modal">
    <div class="modal-content animate__animated animate__zoomIn">
        <span class="close-modal" onclick="closeModal()">×</span>
        <h2 id="modalTitle" style="text-align:center; margin:0;">報名完成</h2>
        <p id="modalTime" style="text-align:center; font-size:0.9rem; color:#666;"></p>
        
        <div class="remind-box">特別醒目提醒：請截圖此畫面備份</div>
        
        <div id="summary"></div>
        <hr style="border: 2px dashed #000;">
        <div id="lineInfo"></div>
        
        <div style="font-size: 0.85rem; line-height: 1.4; background:#f0f0f0; padding:10px; border-radius:10px;">
            1. 直播連結會上傳到此Line群<br>
            2. 請用上述報名的名字申請加入Line群<br>
            3. 完成繳費後才會審核您入群<br>
            <b>收費窗口：杜俊傑</b><br>
            LineID: geoffry0306 / 電話: 0912234429
        </div>
    </div>
</div>

<script>
    let selectedDates = [];

    function toggleSelection(date) {
        const card = date === '3/20' ? document.getElementById('card320') : document.getElementById('card321');
        
        if (selectedDates.includes(date)) {
            selectedDates = selectedDates.filter(d => d !== date);
            card.classList.remove('selected');
        } else {
            selectedDates.push(date);
            card.classList.add('selected');
        }
        
        document.getElementById('selectedDatesInput').value = selectedDates.join(',');
        
        // 自動更新金額
        const amt = selectedDates.length * 100;
        document.getElementById('finalAmount').value = amt;
        document.getElementById('amtDisplay').innerText = amt > 0 ? amt + " 元" : "請選擇課程";
        
        updateTheme();
    }

    function updateTheme() {
        const b = document.body;
        b.className = '';
        if (selectedDates.length === 2) b.classList.add('theme-both');
        else if (selectedDates.includes('3/20')) b.classList.add('theme-320');
        else if (selectedDates.includes('3/21')) b.classList.add('theme-321');
        else b.classList.add('theme-default');
    }

    function zoomImg(e, id) {
        e.stopPropagation(); // 防止觸發選取
        window.open('https://drive.google.com/file/d/'+id+'/view', '_blank');
    }

    function toggleProxy() {
        document.getElementById('proxyDiv').style.display = 
            document.getElementById('payMethod').value === '請他人代繳' ? 'block' : 'none';
    }

    function submitForm() {
        if (selectedDates.length === 0) {
            alert('❌ 請先點擊上方海報，選擇要報名的課程！');
            return;
        }
        
        const email = document.getElementById('email').value;
        const name = document.getElementById('name').value;
        if (!email || !name) {
            alert('❌ 請填寫姓名與 Email 以便發送通知！');
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.innerText = "🚀 傳送資料中...";
        btn.disabled = true;

        const form = document.getElementById('regForm');
        const formData = {
            name: name,
            gender: form.gender.value,
            referrer: form.referrer.value,
            email: email,
            city: form.city.value,
            age: form.age.value,
            identity: form.identity.value,
            payMethod: form.payMethod.value,
            payProxyName: document.getElementById('payProxyName').value,
            amount: document.getElementById('finalAmount').value,
            dates: document.getElementById('selectedDatesInput').value
        };

        // 呼叫 GAS 後端
        google.script.run
            .withSuccessHandler(function(res) {
                showModal(formData, res.time);
                btn.innerText = "送出報名+email通知我";
                btn.disabled = false;
            })
            .withFailureHandler(function(err) {
                alert("錯誤: " + err);
                btn.disabled = false;
                btn.innerText = "重新送出";
            })
            .processForm(formData);
    }

    function showModal(data, time) {
        document.getElementById('modalTime').innerText = time;
        let lineHtml = "";
        let summaryHtml = `
            <div class="info-row"><b>姓名：</b>${data.name}</div>
            <div class="info-row"><b>Email：</b>${data.email}</div>
            <div class="info-row"><b>應繳金額：</b><span style="color:red; font-size:1.3rem;">${data.amount}元</span></div>
            <div class="info-row"><b>報名日期：</b>${data.dates}</div>
        `;

        if (data.dates.includes('3/20')) {
            lineHtml += `
                <div style="text-align:center; margin:15px 0; border:2px solid #fdcb6e; padding:10px; border-radius:15px;">
                    <p style="margin:0; font-weight:bold;">3/20 專屬 Line 群</p>
                    <a href="https://wbl.pse.is/LIVE20260320" style="color:blue; text-decoration:underline;">點此加入群組</a>
                    <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wbl.pse.is/LIVE20260320">
                </div>`;
        }
        if (data.dates.includes('3/21')) {
            lineHtml += `
                <div style="text-align:center; margin:15px 0; border:2px solid #2ecc71; padding:10px; border-radius:15px;">
                    <p style="margin:0; font-weight:bold;">3/21 專屬 Line 群</p>
                    <a href="https://wbl.pse.is/LIVE20260321" style="color:blue; text-decoration:underline;">點此加入群組</a>
                    <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wbl.pse.is/LIVE20260321">
                </div>`;
        }

        document.getElementById('summary').innerHTML = summaryHtml;
        document.getElementById('lineInfo').innerHTML = lineHtml;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>
