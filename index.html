<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --main: #000; --bg: #fff; --accent: #ff4757; }
        body { font-family: 'Noto Sans TC', sans-serif; margin: 0; background: #eee; display: flex; justify-content: center; transition: 0.3s; }
        
        /* 動態主題顏色 */
        body.theme-320 { background: #2c3e50; --accent: #f1c40f; }
        body.theme-321 { background: #e8f5e9; --accent: #2ecc71; }
        body.theme-both { background: #fff0f3; --accent: #e91e63; }

        .app-container { max-width: 450px; width: 100%; background: #fff; border: 6px solid #000; margin: 15px; border-radius: 30px; padding: 25px; box-shadow: 15px 15px 0px #000; box-sizing: border-box; }
        
        h1 { font-size: 1.6rem; text-align: center; border-bottom: 6px solid #000; padding-bottom: 10px; font-weight: 900; }
        
        /* EDM 區塊 */
        .edm-box { position: relative; border: 5px solid #000; border-radius: 20px; overflow: hidden; margin-bottom: 20px; cursor: pointer; background: #ddd; }
        .edm-box img { width: 100%; display: block; transition: 0.3s; }
        .edm-box.selected { border-color: var(--accent); transform: scale(0.97); }
        .edm-box.selected::after { content: "✓ 100元"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent); color: #fff; padding: 10px 20px; font-size: 30px; font-weight: 900; border: 4px solid #000; border-radius: 10px; z-index: 2; }
        
        .zoom-icon { position: absolute; bottom: 10px; right: 10px; background: #fff; border: 3px solid #000; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 5; }

        /* 表單設計 */
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 900; font-size: 1.1rem; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; border: 4px solid #000; border-radius: 12px; font-size: 1.1rem; font-weight: bold; box-sizing: border-box; background: #fff; }
        
        .big-price { background: #000; color: #fff; text-align: center; padding: 20px; border-radius: 15px; font-size: 2rem; font-weight: 900; margin-bottom: 20px; border: 4px solid var(--accent); }

        .submit-btn { width: 100%; padding: 25px; background: #ff4757; color: #fff; border: 5px solid #000; border-radius: 20px; font-size: 1.5rem; font-weight: 900; box-shadow: 0 10px 0 #000; cursor: pointer; transition: 0.1s; }
        .submit-btn:active { transform: translateY(10px); box-shadow: none; }
        .submit-btn:disabled { background: #ccc; }

        /* 成功視窗 */
        #success-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:99; padding:20px; box-sizing:border-box; overflow-y:auto; }
        .modal-card { background:#fff; border:6px solid #000; border-radius:25px; padding:25px; max-width:400px; margin:auto; }
    </style>
</head>
<body class="theme-default">

<div class="app-container animate__animated animate__fadeIn">
    <h1>寰宇新竹「線上直播」報名網</h1>

    <!-- 3/20 -->
    <div id="card320" class="edm-box" onclick="toggleDate('3/20')">
        <img src="https://drive.google.com/thumbnail?id=1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH&sz=w800">
        <div class="zoom-icon" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH/view')">🔍</div>
    </div>

    <!-- 3/21 -->
    <div id="card321" class="edm-box" onclick="toggleDate('3/21')">
        <img src="https://drive.google.com/thumbnail?id=1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0&sz=w800">
        <div class="zoom-icon" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0/view')">🔍</div>
    </div>

    <form id="regForm">
        <div class="field"><label>姓名</label><input type="text" name="name" required></div>
        <div class="field"><label>Email</label><input type="email" name="email" required></div>
        <div class="field"><label>性別</label><select name="gender"><option>男</option><option>女</option></select></div>
        <div class="field"><label>居住縣市</label><select name="city"><option>桃竹苗</option><option>北北基</option><option>中彰投</option><option>雲嘉南</option><option>高屏</option><option>宜花東</option><option>海外</option></select></div>
        <div class="field"><label>介紹人</label><input type="text" name="referrer"></div>
        <div class="field"><label>繳費方式</label>
            <select name="payMethod" id="payMethod" onchange="document.getElementById('proxyWrap').style.display=(this.value.includes('他人')?'block':'none')">
                <option>本人Linepay繳費給窗口</option><option>請他人代繳</option>
            </select>
        </div>
        <div id="proxyWrap" class="field" style="display:none"><label>代繳人姓名</label><input type="text" name="payProxyName"></div>
        
        <div class="big-price" id="priceDisplay">金額：0 元</div>
        
        <button type="button" id="submitBtn" class="submit-btn" onclick="sendForm()">送出報名+email通知我</button>
    </form>
</div>

<!-- 成功通知視窗 -->
<div id="success-modal">
    <div class="modal-card animate__animated animate__backInDown">
        <div style="text-align:right; font-size:30px; cursor:pointer;" onclick="location.reload()">×</div>
        <h2 style="text-align:center; color:red; margin-top:0;">報名成功！</h2>
        <p id="nowTime" style="text-align:center; font-weight:bold;"></p>
        <div style="background:#ffeb3b; padding:10px; border:3px solid #000; text-align:center; font-weight:bold; color:red; margin-bottom:15px;">請截圖此畫面備份</div>
        
        <div id="confirmInfo" style="line-height:1.6; font-weight:bold; border-top:2px solid #eee; padding-top:10px;"></div>
        <hr>
        <div id="qrContent"></div>
        
        <div style="font-size:12px; background:#f9f9f9; padding:10px; border-radius:10px;">
            1. 直播連結會上傳到此Line群<br>
            2. 請用上述報名的名字申請加入Line群<br>
            3. 完成繳費後才會審核您入群<br>
            <b>窗口：杜俊傑 (LineID: geoffry0306)</b>
        </div>
    </div>
</div>

<script>
    let selected = [];

    function toggleDate(d) {
        if(selected.includes(d)) selected = selected.filter(x=>x!==d); else selected.push(d);
        document.getElementById('card320').classList.toggle('selected', selected.includes('3/20'));
        document.getElementById('card321').classList.toggle('selected', selected.includes('3/21'));
        
        let amt = selected.length * 100;
        document.getElementById('priceDisplay').innerText = "金額：" + amt + " 元";
        
        // 切換色彩
        const b = document.body; b.className = '';
        if(selected.length==2) b.classList.add('theme-both');
        else if(selected.includes('3/20')) b.classList.add('theme-320');
        else if(selected.includes('3/21')) b.classList.add('theme-321');
    }

    function sendForm() {
        if(selected.length === 0) return alert('請先點擊上方海報選擇課程！');
        const f = document.getElementById('regForm');
        if(!f.name.value || !f.email.value) return alert('姓名與 Email 必填！');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerText = "傳送中...請勿關閉";

        const payload = {
            name: f.name.value, email: f.email.value, gender: f.gender.value,
            city: f.city.value, referrer: f.referrer.value, payMethod: f.payMethod.value,
            payProxyName: f.payProxyName.value, dates: selected.join(','), amount: selected.length*100
        };

        google.script.run
            .withSuccessHandler(res => {
                if(res.status === 'success') {
                    showSuccess(payload, res.time);
                } else {
                    alert('【伺服器回報錯誤】\n' + res.message);
                    btn.disabled = false; btn.innerText = "重試一次";
                }
            })
            .withFailureHandler(err => {
                alert('【發送失敗】請檢查是否已授權腳本權限，或網路是否通暢。錯誤代碼：' + err);
                btn.disabled = false; btn.innerText = "重試一次";
            })
            .processForm(payload);
    }

    function showSuccess(d, t) {
        document.getElementById('nowTime').innerText = t;
        document.getElementById('confirmInfo').innerHTML = `
            姓名：${d.name}<br>Email：${d.email}<br>繳費金額：${d.amount}元<br>直播日期：${d.dates}
        `;
        let qr = "";
        if(d.dates.includes('3/20')) {
            qr += `<div style="text-align:center; margin-bottom:10px;"><p>3/20 群組連結：<a href="https://wbl.pse.is/LIVE20260320">點此加入</a></p><img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wbl.pse.is/LIVE20260320" style="width:120px; border:2px solid #000;"></div>`;
        }
        if(d.dates.includes('3/21')) {
            qr += `<div style="text-align:center; margin-bottom:10px;"><p>3/21 群組連結：<a href="https://wbl.pse.is/LIVE20260321">點此加入</a></p><img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wbl.pse.is/LIVE20260321" style="width:120px; border:2px solid #000;"></div>`;
        }
        document.getElementById('qrContent').innerHTML = qr;
        document.getElementById('success-modal').style.display = 'block';
    }
</script>
</body>
</html>
