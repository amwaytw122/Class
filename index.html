<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課程報名系統</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入截圖程式庫 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
body { background-color: #f4f7f6; padding: 20px 0; font-family: "Microsoft JhengHei", sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 650px; margin: auto; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }

        .course-card { position: relative; display: flex; align-items: center; border: 2px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.2s; background: #fff; overflow: hidden; }
        .course-card .checkmark-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(74, 108, 247, 0.7); display: none; justify-content: center; align-items: center; z-index: 5; }
        .course-card.selected .checkmark-overlay { display: flex; }
        .course-card .checkmark-overlay::after { content: '✔'; color: white; font-size: 80px; font-weight: bold; }

        .course-img-wrapper { position: relative; text-align: center; margin-right: 15px; z-index: 2; }
        .course-img { width: 100px; height: 130px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .btn-view-img { display: block; font-size: 11px; margin-top: 5px; color: #4a6cf7; text-decoration: none; font-weight: bold; }
        
        .form-label { font-weight: bold; margin-top: 15px; }
        .form-control, .form-select { background-color: #f0f4ff; border: none; border-radius: 10px; height: 45px; }
        .btn-submit { background-color: #4a6cf7; border: none; padding: 15px; font-weight: bold; border-radius: 10px; margin-top: 30px; font-size: 1.2rem; }
        /* 課程卡片 */
        .course-card { position: relative; display: flex; align-items: center; border: 2px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; background: #fff; overflow: hidden; }
        .course-card.selected { border-color: #4a6cf7; background-color: #f0f4ff; }
        .course-card.selected::after { content: '✔'; position: absolute; top: 10px; right: 10px; color: #4a6cf7; font-size: 30px; font-weight: bold; }
        .course-img { width: 80px; height: 110px; object-fit: cover; border-radius: 8px; margin-right: 15px; }

        /* 代繳人區域預設隱藏 */
        #payerSection { display: none; background: #fff3cd; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .form-control { background-color: #f0f4ff; border: none; border-radius: 10px; height: 45px; }
        .btn-submit { background-color: #4a6cf7; border: none; padding: 15px; font-weight: bold; border-radius: 10px; margin-top: 20px; font-size: 1.2rem; }

        /* 分享卡片樣式 (預設隱藏，僅用於截圖) */
        #shareCard { 
            position: absolute; left: -9999px; /* 移出螢幕外 */
            width: 400px; background: white; padding: 30px; border-radius: 15px; border: 2px solid #4a6cf7;
        }
        .share-header { text-align: center; color: #4a6cf7; font-size: 24px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .share-item { margin-bottom: 10px; font-size: 18px; }
        .share-item label { font-weight: bold; color: #666; width: 100px; display: inline-block; }
</style>
</head>
<body>

<div class="container">
<div class="form-container">
<h2 class="text-center mb-4">課程報名表單</h2>
        
<form id="regForm">
            <div class="mb-3">
                <label class="form-label">姓名</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">電子郵件 (確認信將寄到這)</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">聯絡電話</label>
                <input type="tel" name="phone" class="form-control" required>
            </div>

            <!-- 繳費方式 -->
            <div class="mb-3"><label class="form-label">姓名</label><input type="text" id="name" name="name" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">電子郵件</label><input type="email" id="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">聯絡電話</label><input type="tel" id="phone" name="phone" class="form-control" required></div>
<div class="mb-3">
<label class="form-label">繳費方式</label>
                <select name="paymentMethod" id="paymentMethod" class="form-select" onchange="togglePayer(this.value)" required>
                    <option value="本人親自Linepay繳費給窗口">本人親自Linepay繳費給窗口</option>
                <select name="paymentMethod" class="form-select" onchange="togglePayer(this.value)">
                    <option value="本人親自Linepay">本人親自Linepay繳費</option>
<option value="請別人代繳">請別人代繳</option>
</select>
                <input type="text" id="payerName" name="payerName" class="form-control mt-2" style="display:none" placeholder="請輸入代繳人姓名">
</div>

            <!-- 代繳人姓名 (隱藏) -->
            <div id="payerSection">
                <label class="form-label mt-0">代繳人姓名</label>
                <input type="text" name="payerName" id="payerName" class="form-control" placeholder="請輸入代繳人姓名">
            </div>

            <div class="mb-3">
                <label class="form-label">備註</label>
                <textarea name="note" class="form-control" rows="2"></textarea>
            </div>

            <hr class="my-4">
            
            <hr>
<label class="form-label">請選取課程 (可複選)</label>
<div id="courseList">載入中...</div>

<button type="submit" class="btn btn-primary w-100 btn-submit" id="submitBtn">立即完成報名</button>
</form>

        <div id="responseMsg" class="mt-4 text-center alert alert-success" style="display:none;">✅ 報名成功！已寄出電子郵件。</div>
        <!-- 成功後顯示的分享按鈕 -->
        <div id="successArea" class="mt-4 text-center" style="display:none;">
            <div class="alert alert-success">✅ 報名成功！</div>
            <button onclick="shareAsImage()" class="btn btn-warning w-100 fw-bold py-3">📤 分享/保存報名資訊圖片</button>
            <button onclick="location.reload()" class="btn btn-outline-secondary w-100 mt-2">幫其他人報名</button>
        </div>
</div>
</div>

<!-- 隱藏的分享卡片模版 (html2canvas 會來這裡抓圖) -->
<div id="shareCard">
    <div class="share-header">課程報名憑證</div>
    <div class="share-item"><label>報名學員：</label><span id="s_name"></span></div>
    <div class="share-item"><label>聯絡電話：</label><span id="s_phone"></span></div>
    <div class="share-item"><label>報名課程：</label><div id="s_courses" style="margin-left:100px; color:#4a6cf7; font-weight:bold;"></div></div>
    <div style="text-align: center; margin-top: 20px; color: #999; font-size: 12px;">此圖片由系統自動生成，請妥善保存。</div>
</div>

<script>
const scriptURL = 'https://script.google.com/macros/s/AKfycbxeuytERksOxSKm6ceuXrM21DMooTCOJQjxnKylRsmdTbWVQyPBkToAho5YdXOXSA8u/exec'; 
    let hasSubmittedOnce = false;

    // 控制代繳人欄位顯示
function togglePayer(val) {
        const section = document.getElementById('payerSection');
        const input = document.getElementById('payerName');
        if (val === '請別人代繳') {
            section.style.display = 'block';
            input.required = true;
        } else {
            section.style.display = 'none';
            input.required = false;
            input.value = '';
        }
    }

    function getImgUrl(url, mode) {
        if (!url) return 'https://via.placeholder.com/100x130';
        const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
        const fileId = match ? match[1] : '';
        return fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w400` : url;
        document.getElementById('payerName').style.display = (val === '請別人代繳') ? 'block' : 'none';
}

    // 1. 極速載入課程
window.onload = function() {
fetch(scriptURL).then(res => res.json()).then(data => {
const list = document.getElementById('courseList');
list.innerHTML = '';
data.forEach(item => {
const card = document.createElement('div');
card.className = 'course-card';
card.dataset.name = item.name;
card.onclick = function() { this.classList.toggle('selected'); };
card.innerHTML = `
                    <div class="checkmark-overlay"></div>
                    <div class="course-img-wrapper">
                        <img src="${getImgUrl(item.dm, 'thumb')}" class="course-img">
                        <a href="${item.dm}" target="_blank" class="btn-view-img" onclick="event.stopPropagation();">🔍 查看大圖</a>
                    </div>
                    <img src="${item.dm || 'https://via.placeholder.com/80x110'}" class="course-img">
                   <div class="course-info">
                        <div class="course-name">${item.name}</div>
                        <div class="course-detail">📅 ${item.date} (${item.time})<br>👤 主講：${item.speaker}<br>
                        <span class="course-fee">💰 費用：NT$ ${item.fee}</span></div>
                        <div class="fw-bold">${item.name}</div>
                        <div class="text-muted small">${item.date} | ${item.time} | ${item.speaker}</div>
                        <div class="text-danger fw-bold">NT$ ${item.fee}</div>
                   </div>`;
list.appendChild(card);
});
});
};

    // 2. 提交報名
const form = document.getElementById('regForm');
form.addEventListener('submit', e => {
e.preventDefault();
const selected = Array.from(document.querySelectorAll('.course-card.selected')).map(el => el.dataset.name);
        if(selected.length === 0) { alert('❌ 請至少選擇一門課程！'); return; }
        if(selected.length === 0) return alert('請選擇課程');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '處理中...';
        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = '正在處理報名...';

const formData = new FormData(form);
const data = { ...Object.fromEntries(formData.entries()), courses: selected };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)});

        setTimeout(() => {
            document.getElementById('responseMsg').style.display = 'block';
            form.reset();
            document.querySelectorAll('.course-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('payerSection').style.display = 'none';
            
            // 更換按鈕名稱
            hasSubmittedOnce = true;
            btn.innerText = '幫其他人報名';
            btn.disabled = false;
        }, 1500);
        // 填入分享卡片資訊 (準備截圖)
        document.getElementById('s_name').innerText = data.name;
        document.getElementById('s_phone').innerText = data.phone;
        document.getElementById('s_courses').innerText = selected.join('\n');

        setTimeout(() => { document.getElementById('responseMsg').style.display = 'none'; }, 5000);
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)})
        .then(() => {
            form.style.display = 'none';
            document.getElementById('successArea').style.display = 'block';
        });
});

    // 3. 核心功能：生成圖片並分享
    async function shareAsImage() {
        const card = document.getElementById('shareCard');
        // 暫時移入視覺範圍以利截圖
        card.style.left = '0';
        const canvas = await html2canvas(card, { useCORS: true, scale: 2 });
        card.style.left = '-9999px';
        
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '報名憑證.png', { type: 'image/png' });
            
            // 檢查手機是否支援分享功能
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '課程報名資訊',
                        text: '這是我報名的會議資訊！'
                    });
                } catch (err) {
                    // 若取消分享則下載圖片
                    const link = document.createElement('a');
                    link.download = '報名憑證.png';
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
            } else {
                // 不支援分享則直接下載
                const link = document.createElement('a');
                link.download = '報名憑證.png';
                link.href = URL.createObjectURL(blob);
                link.click();
            }
        });
    }
</script>

</body>
</html>
