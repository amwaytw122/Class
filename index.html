<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.2);
      --accent: #fff;
    }
    body {
      margin: 0; padding: 15px; font-family: 'Noto Sans TC', sans-serif;
      background: var(--bg); color: #fff; transition: 0.5s;
      display: flex; justify-content: center;
    }
    /* 主題切換 */
    body.theme-gold { background: radial-gradient(circle at top, #3d3000, #000); --accent: #ffd700; }
    body.theme-green { background: radial-gradient(circle at top, #002b11, #000); --accent: #4ade80; }
    body.theme-pink { background: radial-gradient(circle at top, #3d001f, #000); --accent: #f472b6; }

    .main-card {
      max-width: 480px; width: 100%;
      background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 20px;
      padding: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    h1 { font-size: 20px; text-align: center; margin: 0 0 20px 0; white-space: nowrap; font-weight: 700; }

    /* 海報排版 - 點擊區塊優化 */
    .edm-box { display: flex; gap: 12px; margin-bottom: 20px; }
    .edm-item { flex: 1; position: relative; cursor: pointer; border-radius: 12px; overflow: hidden; border: 3px solid transparent; transition: 0.3s; }
    .edm-item.selected { border-color: var(--accent); transform: scale(1.02); }
    .edm-item img { width: 100%; display: block; filter: brightness(0.6); }
    .edm-item.selected img { filter: brightness(1); }

    .check-mark {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.4); pointer-events: none;
    }
    .edm-item.selected .check-mark { display: flex; }
    .check-mark span { font-size: 40px; color: #fff; }
    .check-mark b { background: #fff; color: #000; padding: 2px 8px; border-radius: 4px; margin-top: 5px; }

    .zoom-hint { position: absolute; bottom: 5px; right: 5px; font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 3px; }

    /* 表單元件 */
    .input-group { margin-bottom: 12px; }
    input, select {
      width: 100%; padding: 10px; border-radius: 8px; border: 2px solid var(--border);
      background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; box-sizing: border-box; outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }

    /* 繳費巨型按鈕 */
    .pay-row { display: flex; gap: 10px; margin: 10px 0; }
    .pay-option {
      flex: 1; padding: 15px; text-align: center; border: 3px solid var(--border);
      border-radius: 12px; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.2s;
    }
    .pay-option.active { border-color: var(--accent); background: var(--accent); color: #000; }

    .submit-btn {
      width: 100%; padding: 16px; margin-top: 15px;
      background: var(--accent); color: #000; border: none; border-radius: 40px;
      font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* 彈窗與放大 */
    #modal, #zoomView {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px;
    }
    .modal-content { background: #fff; color: #333; padding: 25px; border-radius: 15px; width: 100%; max-width: 380px; position: relative; }
    .qr-img { width: 150px; height: 150px; margin: 10px auto; display: block; border: 1px solid #eee; }
    .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }
    .red-alert { color: red; font-weight: bold; text-align: center; border: 1px dashed red; padding: 8px; margin: 10px 0; }
  </style>
</head>
<body>

<div class="main-card">
  <h1>寰宇新竹「線上直播」報名網頁</h1>

  <div class="edm-box">
    <!-- 3/20 -->
    <div class="edm-item" id="edm20" onclick="toggleSelect('2026/03/20')">
      <img src="https://i.imgur.com/kS5WunU.jpg">
      <div class="check-mark"><span>✓</span><b>報名 $100</b></div>
      <div class="zoom-hint" onclick="zoom('https://i.imgur.com/kS5WunU.jpg'); event.stopPropagation();">放大查看</div>
    </div>
    <!-- 3/21 -->
    <div class="edm-item" id="edm21" onclick="toggleSelect('2026/03/21')">
      <img src="https://i.imgur.com/GzYqf2I.jpg">
      <div class="check-mark"><span>✓</span><b>報名 $100</b></div>
      <div class="zoom-hint" onclick="zoom('https://i.imgur.com/GzYqf2I.jpg'); event.stopPropagation();">放大查看</div>
    </div>
  </div>

  <form id="regForm">
    <div class="input-group"><input type="text" id="name" placeholder="姓名"></div>
    <div class="input-group">
      <select id="gender"><option value="">性別</option><option>男</option><option>女</option></select>
    </div>
    <div class="input-group"><input type="text" id="referrer" placeholder="介紹人"></div>
    <div class="input-group"><input type="email" id="email" placeholder="Email (發送通知信)"></div>
    <div class="input-group">
      <select id="city">
        <option value="">居住縣市</option>
        <option>北北基</option><option>桃竹苗</option><option>中彰投</option>
        <option>雲嘉南</option><option>高屏</option><option>宜花東離島</option><option>海外統稱</option>
      </select>
    </div>
    <div class="input-group">
      <select id="age">
        <option value="">年齡區間</option>
        <option>2010-2020</option><option>2000-2010</option><option>1990-2000</option>
        <option>1980-1990</option><option>1970-1980</option><option>1960-1970</option><option>1950以前</option>
      </select>
    </div>
    <div class="input-group">
      <select id="job">
        <option value="">身份別</option>
        <option>上班族</option><option>老闆</option><option>自由業</option><option>家庭主婦</option><option>退休人士</option>
      </select>
    </div>

    <label style="font-size:14px; color:#bbb;">繳費方式：</label>
    <div class="input-group">
      <select id="payMethod" onchange="showPayer(this.value)">
        <option value="本人Linepay">本人Linepay繳費給窗口</option>
        <option value="他人代繳">請他人代繳</option>
      </select>
    </div>
    <div id="payerBox" class="input-group" style="display:none;">
      <input type="text" id="payerName" placeholder="填寫代繳人姓名">
    </div>

    <label style="font-size:14px; color:#bbb;">繳費金額：</label>
    <div class="pay-row">
      <div class="pay-option active" onclick="setPay(100, this)">$100</div>
      <div class="pay-option" onclick="setPay(200, this)">$200</div>
    </div>

    <div style="font-size:12px; color:#888; text-align:center; margin:10px 0;">
      窗口：杜俊傑 (Line: geoffry0306 / 0912234429)
    </div>

    <button type="button" class="submit-btn" onclick="submitData()">送出報名 + email 通知我</button>
  </form>
</div>

<div id="zoomView" onclick="this.style.display='none'"><img id="bigImg" style="max-width:100%; max-height:90vh;"></div>

<div id="modal">
  <div class="modal-content">
    <span class="close-btn" onclick="document.getElementById('modal').style.display='none'">&times;</span>
    <h3 style="text-align:center; margin:0;">報名完成</h3>
    <p id="finishTime" style="font-size:11px; text-align:center; color:#888;"></p>
    <div id="confirmData" style="font-size:14px; line-height:1.5; background:#f5f5f5; padding:10px; border-radius:8px;"></div>
    <div class="red-alert">請截圖此畫面備份</div>
    <div id="links"></div>
    <p style="font-size:11px; color:#666; margin-top:10px;">
      1. 直播連結會傳到群組<br>2. 請用報名名字入群<br>3. 繳費後審核入群<br>窗口：杜俊傑 (Line: geoffry0306)
    </p>
  </div>
</div>

<script>
  let picks = [];
  let price = 100;

  function toggleSelect(date) {
    const id = date.includes('20') ? 'edm20' : 'edm21';
    const el = document.getElementById(id);
    const pos = picks.indexOf(date);
    
    if (pos > -1) { picks.splice(pos, 1); el.classList.remove('selected'); }
    else { picks.push(date); el.classList.add('selected'); }

    // 背景切換
    const b = document.body;
    b.className = '';
    if (picks.length === 2) b.classList.add('theme-pink');
    else if (picks.includes('2026/03/20')) b.classList.add('theme-gold');
    else if (picks.includes('2026/03/21')) b.classList.add('theme-green');
  }

  function zoom(src) {
    document.getElementById('bigImg').src = src;
    document.getElementById('zoomView').style.display = 'flex';
  }

  function setPay(val, el) {
    price = val;
    document.querySelectorAll('.pay-option').forEach(opt => opt.classList.remove('active'));
    el.classList.add('active');
  }

  function showPayer(v) { document.getElementById('payerBox').style.display = (v === '他人代繳' ? 'block' : 'none'); }

  function submitData() {
    if (picks.length === 0) return alert('請先點選海報選擇場次');
    const btn = document.querySelector('.submit-btn');
    btn.disabled = true; btn.innerText = '處理中...';

    const payload = {
      selectedEvents: picks,
      name: document.getElementById('name').value,
      gender: document.getElementById('gender').value,
      referrer: document.getElementById('referrer').value,
      email: document.getElementById('email').value,
      city: document.getElementById('city').value,
      age: document.getElementById('age').value,
      occupation: document.getElementById('job').value,
      payMethod: document.getElementById('payMethod').value,
      payerName: document.getElementById('payerName').value,
      payAmount: price
    };

    google.script.run.withSuccessHandler(res => {
      document.getElementById('finishTime').innerText = res.time;
      document.getElementById('confirmData').innerHTML = `
        <b>姓名：</b>${payload.name}<br><b>Email：</b>${payload.email}<br>
        <b>繳費：</b>$${payload.payAmount}<br><b>日期：</b>${picks.join(', ')}
      `;

      let h = '';
      picks.forEach(d => {
        const link = d.includes('20') ? 'https://wbl.pse.is/LIVE20260320' : 'https://wbl.pse.is/LIVE20260321';
        const img = d.includes('20') ? 'https://i.imgur.com/kS5WunU.jpg' : 'https://i.imgur.com/GzYqf2I.jpg';
        h += `
          <div style="text-align:center; margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
            <img src="${img}" style="width:40px; border-radius:4px;"><br>
            <a href="${link}" target="_blank" style="font-size:12px; color:#007bff;">${link}</a><br>
            <img class="qr-img" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${link}">
          </div>
        `;
      });
      document.getElementById('links').innerHTML = h;
      document.getElementById('modal').style.display = 'flex';
      btn.disabled = false; btn.innerText = '送出報名 + email 通知我';
    }).processForm(payload);
  }
</script>

</body>
</html>
