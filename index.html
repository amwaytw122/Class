<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #4A90E2;
            --bg: #f5f7fa;
            --border: #333;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            transition: all 0.5s ease;
            margin: 0; padding: 15px;
            display: flex; justify-content: center;
        }
        /* 主題顏色控制 */
        body.theme-320 { background-color: #2c2c2c; color: #ffd700; --border: #ffd700; }
        body.theme-321 { background-color: #e8f5e9; color: #2e7d32; --border: #2e7d32; }
        body.theme-both { background-color: #fce4ec; color: #c2185b; --border: #c2185b; }

        .container {
            max-width: 500px; width: 100%;
            background: white; border: 4px solid var(--border);
            border-radius: 20px; padding: 20px;
            box-shadow: 10px 10px 0px var(--border);
            color: #333;
        }
        .theme-320 .container { background: #1a1a1a; color: #ffd700; }
        .theme-321 .container { background: white; color: #2e7d32; }
        .theme-both .container { background: white; color: #c2185b; }

        h1 { text-align: center; font-size: 1.5rem; margin-bottom: 20px; border-bottom: 3px solid var(--border); padding-bottom: 10px; }
        
        /* EDM 樣式 */
        .edm-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .edm-card {
            position: relative; border: 4px solid var(--border);
            border-radius: 15px; overflow: hidden; cursor: pointer;
            transition: transform 0.2s;
        }
        .edm-card.selected { transform: scale(0.95); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .edm-card img { width: 100%; display: block; }
        .check-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; font-size: 50px; font-weight: bold;
        }
        .edm-card.selected .check-overlay { display: flex; }
        .zoom-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: white; border: 2px solid #333; border-radius: 50%;
            width: 40px; height: 40px; display: flex; justify-content: center; align-items: center;
            font-size: 20px; z-index: 10;
        }

        /* 表單元素 */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 1.1rem; }
        input, select {
            width: 100%; padding: 12px; border: 3px solid var(--border);
            border-radius: 10px; font-size: 1rem; box-sizing: border-box;
            background: #fff;
        }
        
        .amount-btns { display: flex; gap: 10px; }
        .amt-btn {
            flex: 1; padding: 20px; border: 4px solid var(--border);
            border-radius: 15px; font-size: 1.5rem; font-weight: bold;
            cursor: pointer; text-align: center; background: white;
        }
        .amt-btn.active { background: var(--border); color: white; }

        .submit-btn {
            width: 100%; padding: 20px; background: #ff4757; color: white;
            border: 4px solid #333; border-radius: 15px; font-size: 1.3rem;
            font-weight: bold; cursor: pointer; margin-top: 20px;
            box-shadow: 0 5px 0 #333;
        }
        .submit-btn:active { transform: translateY(5px); box-shadow: none; }

        /* Modal 彈窗 */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; overflow-y: auto;
            color: white; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: white; color: #333; padding: 20px; border-radius: 20px;
            max-width: 450px; margin: 20px auto; position: relative;
        }
        .close-modal { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; }
        .remind-box { background: #fff3cd; border: 2px dashed #856404; padding: 10px; margin: 10px 0; text-align: center; font-weight: bold; color: red; }
        .qr-code { width: 150px; height: 150px; margin: 10px auto; display: block; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeIn">
    <h1>寰宇新竹「線上直播」報名網頁</h1>

    <div class="edm-container">
        <!-- 3/20 -->
        <div class="edm-card" id="card320" onclick="toggleSelection('3/20')">
            <img src="https://drive.google.com/uc?id=1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH" alt="3/20">
            <div class="zoom-btn" onclick="zoomImg(event, '1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH')">🔍</div>
            <div class="check-overlay">✓<br><small>$100</small></div>
        </div>
        <!-- 3/21 -->
        <div class="edm-card" id="card321" onclick="toggleSelection('3/21')">
            <img src="https://drive.google.com/uc?id=1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0" alt="3/21">
            <div class="zoom-btn" onclick="zoomImg(event, '1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0')">🔍</div>
            <div class="check-overlay">✓<br><small>$100</small></div>
        </div>
    </div>

    <form id="regForm">
        <div class="form-group">
            <label>姓名</label>
            <input type="text" name="name" placeholder="請輸入姓名">
        </div>
        <div class="form-group">
            <label>性別</label>
            <select name="gender">
                <option value="">請選擇</option>
                <option value="男">男</option>
                <option value="女">女</option>
            </select>
        </div>
        <div class="form-group">
            <label>介紹人</label>
            <input type="text" name="referrer">
        </div>
        <div class="form-group">
            <label>Email (必填，發送通知)</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>居住縣市</label>
            <select name="city">
                <option value="北北基">北北基</option>
                <option value="桃竹苗">桃竹苗</option>
                <option value="中彰投">中彰投</option>
                <option value="雲嘉南">雲嘉南</option>
                <option value="高屏">高屏</option>
                <option value="宜花東離島">宜花東離島</option>
                <option value="海外">海外</option>
            </select>
        </div>
        <div class="form-group">
            <label>年齡</label>
            <select name="age">
                <option value="2000-2010">2000-2010 (14-24歲)</option>
                <option value="1990-2000">1990-2000 (24-34歲)</option>
                <option value="1980-1990">1980-1990 (34-44歲)</option>
                <option value="1970-1980">1970-1980 (44-54歲)</option>
                <option value="1960-1970">1960-1970 (54-64歲)</option>
                <option value="1960以前">1960以前</option>
            </select>
        </div>
        <div class="form-group">
            <label>身份別</label>
            <select name="identity">
                <option value="上班族">上班族</option>
                <option value="老闆">老闆</option>
                <option value="自由業">自由業</option>
                <option value="家庭主婦">家庭主婦</option>
                <option value="退休人士">退休人士</option>
            </select>
        </div>
        <div class="form-group">
            <label>繳費方式</label>
            <select name="payMethod" id="payMethod" onchange="toggleProxy()">
                <option value="本人Linepay繳費給窗口">本人Linepay繳費給窗口</option>
                <option value="請他人代繳">請他人代繳</option>
            </select>
        </div>
        <div class="form-group" id="proxyDiv" style="display:none">
            <label>代繳人姓名</label>
            <input type="text" name="payProxyName">
        </div>

        <label>繳費金額</label>
        <div class="amount-btns">
            <div class="amt-btn" onclick="setAmt(100)" id="amt100">100元</div>
            <div class="amt-btn" onclick="setAmt(200)" id="amt200">200元</div>
        </div>
        <input type="hidden" name="amount" id="finalAmount" value="100">
        <input type="hidden" name="dates" id="selectedDates" value="">

        <button type="button" class="submit-btn" onclick="submitForm()">送出報名+email通知我</button>
    </form>
</div>

<!-- 成功彈窗 -->
<div id="modal">
    <div class="modal-content animate__animated animate__zoomIn">
        <span class="close-modal" onclick="closeModal()">×</span>
        <h2 id="modalTitle">報名完成</h2>
        <div class="remind-box">⚠️ 請截圖此畫面備份</div>
        <div id="summary"></div>
        <hr>
        <div id="lineInfo"></div>
        <p style="font-size: 0.8rem; line-height: 1.2;">
            1. 直播連結會上傳到此Line群<br>
            2. 請用上述報名的名字申請加入Line群<br>
            3. 完成繳費後才會審核您入群<br>
            4. 窗口：杜俊傑 (LineID: geoffry0306 / 電話: 0912234429)
        </p>
    </div>
</div>

<script>
    let selectedDates = [];

    function toggleSelection(date) {
        const card = date === '3/20' ? document.getElementById('card320') : document.getElementById('card321');
        if (selectedDates.includes(date)) {
            selectedDates = selectedDates.filter(d => d !== date);
            card.classList.remove('selected');
        } else {
            selectedDates.push(date);
            card.classList.add('selected');
        }
        document.getElementById('selectedDates').value = selectedDates.join(',');
        updateTheme();
    }

    function updateTheme() {
        document.body.className = '';
        if (selectedDates.length === 2) document.body.classList.add('theme-both');
        else if (selectedDates.includes('3/20')) document.body.classList.add('theme-320');
        else if (selectedDates.includes('3/21')) document.body.classList.add('theme-321');
    }

    function zoomImg(e, id) {
        e.stopPropagation();
        window.open('https://drive.google.com/file/d/'+id+'/view', '_blank');
    }

    function toggleProxy() {
        document.getElementById('proxyDiv').style.display = 
            document.getElementById('payMethod').value === '請他人代繳' ? 'block' : 'none';
    }

    function setAmt(val) {
        document.getElementById('finalAmount').value = val;
        document.getElementById('amt100').classList.toggle('active', val === 100);
        document.getElementById('amt200').classList.toggle('active', val === 200);
    }

    function submitForm() {
        if (selectedDates.length === 0) { alert('請選擇至少一個活動日期'); return; }
        const form = document.getElementById('regForm');
        if (!form.email.value) { alert('請填寫 Email'); return; }

        const btn = document.querySelector('.submit-btn');
        btn.innerText = "處理中...";
        btn.disabled = true;

        const formData = {
            name: form.name.value,
            gender: form.gender.value,
            referrer: form.referrer.value,
            email: form.email.value,
            city: form.city.value,
            age: form.age.value,
            identity: form.identity.value,
            payMethod: form.payMethod.value,
            payProxyName: form.payProxyName.value,
            amount: form.amount.value,
            dates: form.selectedDates.value
        };

        google.script.run.withSuccessHandler(function(res) {
            showModal(formData, res.time);
            btn.innerText = "送出報名+email通知我";
            btn.disabled = false;
        }).processForm(formData);
    }

    function showModal(data, time) {
        document.getElementById('modalTitle').innerText = "報名完成！\n" + time;
        let lineHtml = "";
        let summaryHtml = `
            <p><b>姓名：</b>${data.name}</p>
            <p><b>Email：</b>${data.email}</p>
            <p><b>繳費金額：</b>${data.amount}元</p>
            <p><b>報名日期：</b>${data.dates}</p>
        `;

        if (data.dates.includes('3/20')) {
            lineHtml += `
                <div style="text-align:center; margin-top:10px;">
                    <p><b>3/20 Line群連結：</b><br><a href="https://wbl.pse.is/LIVE20260320">點此加入</a></p>
                    <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wbl.pse.is/LIVE20260320">
                </div>`;
        }
        if (data.dates.includes('3/21')) {
            lineHtml += `
                <div style="text-align:center; margin-top:10px;">
                    <p><b>3/21 Line群連結：</b><br><a href="https://wbl.pse.is/LIVE20260321">點此加入</a></p>
                    <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wbl.pse.is/LIVE20260321">
                </div>`;
        }

        document.getElementById('summary').innerHTML = summaryHtml;
        document.getElementById('lineInfo').innerHTML = lineHtml;
        document.getElementById('modal').style.display = 'block';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
</script>

</body>
</html>
