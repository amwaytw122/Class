<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root { --p: #000; --bg: #f0f0f0; }
        body { font-family: sans-serif; background: var(--bg); padding: 10px; display: flex; justify-content: center; }
        .container { max-width: 450px; width: 100%; background: #fff; border: 5px solid #000; border-radius: 20px; padding: 20px; box-shadow: 10px 10px 0 #000; box-sizing: border-box; }
        
        /* 圖片區 */
        .edm-card { position: relative; border: 4px solid #000; border-radius: 15px; overflow: hidden; margin-bottom: 15px; cursor: pointer; transition: 0.2s; background: #ddd; }
        .edm-card img { width: 100%; display: block; min-height: 150px; }
        .edm-card.selected { border-color: #ff4757; transform: scale(0.98); }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); display:none; color:#fff; font-size:60px; justify-content:center; align-items:center; font-weight:bold; pointer-events:none; }
        .edm-card.selected .overlay { display: flex; }
        .zoom { position: absolute; bottom: 10px; right: 10px; background: #fff; border: 2px solid #000; padding: 5px 10px; border-radius: 10px; z-index: 5; }

        /* 表單 */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 900; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 3px solid #000; border-radius: 10px; box-sizing: border-box; font-size: 16px; font-weight: bold; }
        
        .amt-box { background: #ffeb3b; border: 4px solid #000; padding: 15px; text-align: center; font-size: 24px; font-weight: 900; margin: 15px 0; border-radius: 10px; }
        
        .btn-submit { width: 100%; padding: 20px; background: #ff4757; color: #fff; border: 4px solid #000; border-radius: 15px; font-size: 20px; font-weight: 900; box-shadow: 0 6px 0 #000; cursor: pointer; }
        .btn-submit:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }

        /* 彈窗 */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:99; padding:20px; box-sizing:border-box; overflow-y:auto; }
        .m-content { background:#fff; padding:20px; border:5px solid #000; border-radius:20px; max-width:400px; margin:auto; position:relative; }
        
        /* 配色 */
        body.t320 { background: #2c3e50; } body.t320 .container { border-color: #f1c40f; box-shadow: 10px 10px 0 #f1c40f; }
        body.t321 { background: #d5f5e3; } body.t321 .container { border-color: #27ae60; box-shadow: 10px 10px 0 #27ae60; }
        body.tBoth { background: #fce4ec; } body.tBoth .container { border-color: #e91e63; box-shadow: 10px 10px 0 #e91e63; }
    </style>
</head>
<body>

<div class="container animate__animated animate__fadeInUp">
    <h2 style="text-align:center; border-bottom:4px solid #000; padding-bottom:10px;">寰宇新竹「線上直播」報名</h2>

    <div id="card320" class="edm-card" onclick="sel('3/20')">
        <img src="https://drive.google.com/thumbnail?id=1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH&sz=w800">
        <div class="zoom" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH/view')">放大</div>
        <div class="overlay">✓</div>
    </div>

    <div id="card321" class="edm-card" onclick="sel('3/21')">
        <img src="https://drive.google.com/thumbnail?id=1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0&sz=w800">
        <div class="zoom" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0/view')">放大</div>
        <div class="overlay">✓</div>
    </div>

    <form id="f">
        <div class="form-group"><label>姓名</label><input type="text" name="name" required></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" required></div>
        <div class="form-group"><label>性別</label><select name="gender"><option>男</option><option>女</option></select></div>
        <div class="form-group"><label>居住縣市</label><select name="city"><option>桃竹苗</option><option>北北基</option><option>中彰投</option><option>雲嘉南</option><option>高屏</option><option>宜花東</option><option>海外</option></select></div>
        <div class="form-group"><label>介紹人</label><input type="text" name="referrer"></div>
        <div class="form-group"><label>繳費方式</label>
            <select name="payMethod" onchange="document.getElementById('pBox').style.display=(this.value.includes('他人')?'block':'none')">
                <option>本人Linepay繳費給窗口</option><option>請他人代繳</option>
            </select>
        </div>
        <div id="pBox" class="form-group" style="display:none"><label>代繳人姓名</label><input type="text" name="payProxyName"></div>
        
        <div class="amt-box" id="aDisp">金額：0 元</div>
        
        <button type="button" class="btn-submit" id="sBtn" onclick="send()">送出報名+email通知我</button>
    </form>
</div>

<div id="modal">
    <div class="m-content animate__animated animate__zoomIn">
        <h3 style="text-align:center; color:red;">✅ 報名完成</h3>
        <p id="mTime" style="text-align:center; font-size:12px;"></p>
        <div style="background:#ffeb3b; padding:10px; border:2px solid #000; text-align:center; font-weight:bold; margin-bottom:10px;">⚠️ 請截圖此畫面備份</div>
        <div id="res"></div>
        <hr>
        <div id="qr"></div>
        <p style="font-size:12px; color:#666;">窗口：杜俊傑 (Line: geoffry0306)</p>
        <button onclick="location.reload()" style="width:100%; padding:10px;">關閉</button>
    </div>
</div>

<script>
    let sDate = [];
    function sel(d) {
        if(sDate.includes(d)) sDate = sDate.filter(x=>x!==d); else sDate.push(d);
        document.getElementById('card320').classList.toggle('selected', sDate.includes('3/20'));
        document.getElementById('card321').classList.toggle('selected', sDate.includes('3/21'));
        let amt = sDate.length * 100;
        document.getElementById('aDisp').innerText = "金額：" + amt + " 元";
        
        document.body.className = '';
        if(sDate.length==2) document.body.classList.add('tBoth');
        else if(sDate.includes('3/20')) document.body.classList.add('t320');
        else if(sDate.includes('3/21')) document.body.classList.add('t321');
    }

    function send() {
        if(sDate.length==0) return alert('請先點選海報選擇日期');
        const f = document.getElementById('f');
        if(!f.name.value || !f.email.value) return alert('請填寫姓名與 Email');

        const btn = document.getElementById('sBtn');
        btn.disabled = true; btn.innerText = "傳送中...";

        const data = {
            name: f.name.value, email: f.email.value, gender: f.gender.value,
            city: f.city.value, referrer: f.referrer.value, payMethod: f.payMethod.value,
            payProxyName: f.payProxyName.value, dates: sDate.join(','), amount: sDate.length*100,
            age: "未填", identity: "未填"
        };

        google.script.run.withSuccessHandler(res => {
            if(res.status === "error") {
                alert("伺服器錯誤: " + res.message);
                btn.disabled = false; btn.innerText = "重試";
            } else {
                showM(data, res.time);
            }
        }).withFailureHandler(err => {
            alert("網路發送失敗: " + err);
            btn.disabled = false; btn.innerText = "重試";
        }).processForm(data);
    }

    function showM(d, t) {
        document.getElementById('mTime').innerText = t;
        document.getElementById('res').innerHTML = `<b>姓名：</b>${d.name}<br><b>金額：</b>${d.amount}元<br><b>日期：</b>${d.dates}`;
        let q = "";
        if(d.dates.includes('3/20')) q += `<p>3/20 群組：<br><img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wbl.pse.is/LIVE20260320" style="width:100px;"></p>`;
        if(d.dates.includes('3/21')) q += `<p>3/21 群組：<br><img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wbl.pse.is/LIVE20260321" style="width:100px;"></p>`;
        document.getElementById('qr').innerHTML = q;
        document.getElementById('modal').style.display = 'block';
    }
</script>
</body>
</html>
