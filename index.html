<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課程報名系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入截圖程式庫 -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        body { background-color: #f4f7f6; padding: 20px 0; font-family: "Microsoft JhengHei", sans-serif; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        
        /* 課程卡片 */
        .course-card { position: relative; display: flex; align-items: center; border: 2px solid #eee; border-radius: 12px; padding: 15px; margin-bottom: 15px; cursor: pointer; background: #fff; overflow: hidden; }
        .course-card.selected { border-color: #4a6cf7; background-color: #f0f4ff; }
        .course-card.selected::after { content: '✔'; position: absolute; top: 10px; right: 10px; color: #4a6cf7; font-size: 30px; font-weight: bold; }
        .course-img { width: 80px; height: 110px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
        
        .form-control { background-color: #f0f4ff; border: none; border-radius: 10px; height: 45px; }
        .btn-submit { background-color: #4a6cf7; border: none; padding: 15px; font-weight: bold; border-radius: 10px; margin-top: 20px; font-size: 1.2rem; }

        /* 分享卡片樣式 (預設隱藏，僅用於截圖) */
        #shareCard { 
            position: absolute; left: -9999px; /* 移出螢幕外 */
            width: 400px; background: white; padding: 30px; border-radius: 15px; border: 2px solid #4a6cf7;
        }
        .share-header { text-align: center; color: #4a6cf7; font-size: 24px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .share-item { margin-bottom: 10px; font-size: 18px; }
        .share-item label { font-weight: bold; color: #666; width: 100px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4">課程報名表單</h2>
        <form id="regForm">
            <div class="mb-3"><label class="form-label">姓名</label><input type="text" id="name" name="name" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">電子郵件</label><input type="email" id="email" name="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">聯絡電話</label><input type="tel" id="phone" name="phone" class="form-control" required></div>
            <div class="mb-3">
                <label class="form-label">繳費方式</label>
                <select name="paymentMethod" class="form-select" onchange="togglePayer(this.value)">
                    <option value="本人親自Linepay">本人親自Linepay繳費</option>
                    <option value="請別人代繳">請別人代繳</option>
                </select>
                <input type="text" id="payerName" name="payerName" class="form-control mt-2" style="display:none" placeholder="請輸入代繳人姓名">
            </div>
            
            <hr>
            <label class="form-label">請選取課程 (可複選)</label>
            <div id="courseList">載入中...</div>

            <button type="submit" class="btn btn-primary w-100 btn-submit" id="submitBtn">立即完成報名</button>
        </form>

        <!-- 成功後顯示的分享按鈕 -->
        <div id="successArea" class="mt-4 text-center" style="display:none;">
            <div class="alert alert-success">✅ 報名成功！</div>
            <button onclick="shareAsImage()" class="btn btn-warning w-100 fw-bold py-3">📤 分享/保存報名資訊圖片</button>
            <button onclick="location.reload()" class="btn btn-outline-secondary w-100 mt-2">幫其他人報名</button>
        </div>
    </div>
</div>

<!-- 隱藏的分享卡片模版 (html2canvas 會來這裡抓圖) -->
<div id="shareCard">
    <div class="share-header">課程報名憑證</div>
    <div class="share-item"><label>報名學員：</label><span id="s_name"></span></div>
    <div class="share-item"><label>聯絡電話：</label><span id="s_phone"></span></div>
    <div class="share-item"><label>報名課程：</label><div id="s_courses" style="margin-left:100px; color:#4a6cf7; font-weight:bold;"></div></div>
    <div style="text-align: center; margin-top: 20px; color: #999; font-size: 12px;">此圖片由系統自動生成，請妥善保存。</div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxeuytERksOxSKm6ceuXrM21DMooTCOJQjxnKylRsmdTbWVQyPBkToAho5YdXOXSA8u/exec'; 

    function togglePayer(val) {
        document.getElementById('payerName').style.display = (val === '請別人代繳') ? 'block' : 'none';
    }

    // 1. 極速載入課程
    window.onload = function() {
        fetch(scriptURL).then(res => res.json()).then(data => {
            const list = document.getElementById('courseList');
            list.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'course-card';
                card.dataset.name = item.name;
                card.onclick = function() { this.classList.toggle('selected'); };
                card.innerHTML = `
                    <img src="${item.dm || 'https://via.placeholder.com/80x110'}" class="course-img">
                    <div class="course-info">
                        <div class="fw-bold">${item.name}</div>
                        <div class="text-muted small">${item.date} | ${item.time} | ${item.speaker}</div>
                        <div class="text-danger fw-bold">NT$ ${item.fee}</div>
                    </div>`;
                list.appendChild(card);
            });
        });
    };

    // 2. 提交報名
    const form = document.getElementById('regForm');
    form.addEventListener('submit', e => {
        e.preventDefault();
        const selected = Array.from(document.querySelectorAll('.course-card.selected')).map(el => el.dataset.name);
        if(selected.length === 0) return alert('請選擇課程');

        document.getElementById('submitBtn').disabled = true;
        document.getElementById('submitBtn').innerText = '正在處理報名...';

        const formData = new FormData(form);
        const data = { ...Object.fromEntries(formData.entries()), courses: selected };

        // 填入分享卡片資訊 (準備截圖)
        document.getElementById('s_name').innerText = data.name;
        document.getElementById('s_phone').innerText = data.phone;
        document.getElementById('s_courses').innerText = selected.join('\n');

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data)})
        .then(() => {
            form.style.display = 'none';
            document.getElementById('successArea').style.display = 'block';
        });
    });

    // 3. 核心功能：生成圖片並分享
    async function shareAsImage() {
        const card = document.getElementById('shareCard');
        // 暫時移入視覺範圍以利截圖
        card.style.left = '0';
        const canvas = await html2canvas(card, { useCORS: true, scale: 2 });
        card.style.left = '-9999px';
        
        canvas.toBlob(async (blob) => {
            const file = new File([blob], '報名憑證.png', { type: 'image/png' });
            
            // 檢查手機是否支援分享功能
            if (navigator.share) {
                try {
                    await navigator.share({
                        files: [file],
                        title: '課程報名資訊',
                        text: '這是我報名的會議資訊！'
                    });
                } catch (err) {
                    // 若取消分享則下載圖片
                    const link = document.createElement('a');
                    link.download = '報名憑證.png';
                    link.href = URL.createObjectURL(blob);
                    link.click();
                }
            } else {
                // 不支援分享則直接下載
                const link = document.createElement('a');
                link.download = '報名憑證.png';
                link.href = URL.createObjectURL(blob);
                link.click();
            }
        });
    }
</script>

</body>
</html>
