<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3/20、3/21線上直播報名</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        /* 1. 基礎設定與移除外框陰影 */
        :root { --border: #000; --accent: #ff4757; --bg: #f0f0f0; }
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            margin: 0; 
            transition: 0.4s;
            box-shadow: none !important; 
        }

        .app-container {
            max-width: 500px;
            width: 100%;
            background: transparent;
            box-shadow: none !important; 
        }

        /* 2. 輸入框預設顏色 */
        ::placeholder { color: #ccc; opacity: 1; }
        select:invalid { color: #ccc !important; }
        select option { color: #000; }
        select:valid { color: #000; }

        /* 3. 動態主題背景 */
        body.theme-320 { background: #FFE153; --accent: #f1c40f; }
        body.theme-321 { background: #D3FF93; --accent: #2ecc71; }
        body.theme-both { background: #CA8EC2; --accent: #e91e63; }

        h1 { font-size: 2.3rem; text-align: center; border-bottom: 6px solid #000; padding-bottom: 15px; font-weight: 900; margin-top: 0; }

        /* 4. EDM 樣式 */
        .edm-box { position: relative; border: 5px solid #000; border-radius: 20px; overflow: visible; margin-bottom: 50px; cursor: pointer; transition: 0.2s; background: #eee; }
        .edm-box img { width: 100%; display: block; border-radius: 15px; }
        .edm-box.selected { border-color: var(--accent); transform: translateY(5px); }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display:none; flex-direction: column; justify-content:center; align-items:center; color:#fff; border-radius: 15px; }
        .edm-box.selected .overlay { display: flex; }
        .check-mark { font-size: 100px; color: #2ecc71; font-weight: 900; }
        .zoom-btn { position: absolute; bottom: -45px; right: 5px; background: #fff; border: 3px solid #000; border-radius: 12px; padding: 8px; font-weight: bold; z-index: 10; }

        /* 5. 表單元件 */
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 900; margin-bottom: 8px; font-size: 1.1rem; }
        input, select { width: 100%; padding: 15px; border: 4px solid #000; border-radius: 15px; font-size: 1.1rem; font-weight: bold; box-sizing: border-box; background: #fff; -webkit-appearance: none; }
        .price-display { color: #ff4757; text-align: center; font-size: 2.2rem; font-weight: 900; margin: 10px 0; }
        .submit-btn { width: 100%; padding: 25px; background: #ff4757; color: #fff; border: 5px solid #000; border-radius: 20px; font-size: 1.6rem; font-weight: 900; box-shadow: 0 10px 0 #000; cursor: pointer; }
        .submit-btn:active { transform: translateY(10px); box-shadow: none; }
        .submit-btn:disabled { background: #999; cursor: not-allowed; }

        /* 6. Modal 成功視窗 */
        #modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; padding:15px; box-sizing:border-box; overflow-y:auto; }
        .m-card { background:#fff; border:6px solid #000; border-radius:30px; padding:10px 25px 25px 25px; max-width:420px; margin: 10px auto; position:relative; }
        .m-title { color:red; text-align:center; font-size:28px; font-weight:900; margin-top: 0; margin-bottom: 5px;  }
        .m-time { text-align:center; font-weight:900; font-size:1.3rem; margin: 10px 0; }
        .m-yellow-box { background:#ffeb3b; border:4px solid #000; padding:12px; text-align:center; font-weight:900; color:red; margin:15px 0; font-size:1.4rem; border-radius: 5px; }
        .m-data-row { font-weight:900; font-size:1.5rem; line-height:1.1; margin: 2px 0; }
        .m-blue-time { color: blue; font-weight: 900;  line-height:1.1;  margin-top: 0; }
        .m-dashed { border-bottom: 4px dashed #000; margin: 20px 0; }
        .m-zoom-box { text-align:center; font-size:1.3rem; font-weight:900; background:#fffbe6; border:3px solid #000; padding:15px; border-radius:15px; margin-bottom:15px; color:#000; }
        
        /* 複製按鈕樣式 */
        .copy-btn { width:100%; padding:20px; background:#00c300; color:#fff; border:4px solid #000; border-radius:15px; font-size:1.4rem; font-weight:900; cursor:pointer; box-shadow:0 6px 0 #000; margin-top:10px; }
        .copy-btn:active { transform: translateY(4px); box-shadow:none; }
    </style>
</head>
<body class="theme-default">

<div class="app-container animate__animated animate__fadeIn">
    <h1>3/20(五) 3/21(六)<br>線上直播報名</h1>

    <!-- 3/20 EDM -->
    <div id="card320" class="edm-box" onclick="toggleDate('3/20')">
        <img src="https://drive.google.com/thumbnail?id=1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH&sz=w800">
        <div class="zoom-btn" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1CxuetIaIJ25Ic1gYDMTXTiIDoTZdfLZH/view')">放大海報🔍</div>
        <div class="overlay"><div class="check-mark">✓</div><div style="font-size:70px; font-weight:900;">100元</div></div>
    </div>

    <!-- 3/21 EDM -->
    <div id="card321" class="edm-box" onclick="toggleDate('3/21')">
        <img src="https://drive.google.com/thumbnail?id=1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0&sz=w800">
        <div class="zoom-btn" onclick="event.stopPropagation(); window.open('https://drive.google.com/file/d/1ZSb9QdbeekYHjmfRy9wgpKofO3d2RTi0/view')">放大海報🔍</div>
        <div class="overlay"><div class="check-mark">✓</div><div style="font-size:70px; font-weight:900;">100元</div></div>
    </div>

    <form id="regForm">
        <div class="field"><label>姓名</label><input type="text" name="name" placeholder="請用此姓名登入zoom直播間"></div>
        <div class="field"><label>性別</label><select name="gender" required><option value="">請點選</option><option>男</option><option>女</option></select></div>
        <div class="field"><label>介紹人</label><input type="text" name="referrer" placeholder="按此輸入"></div>
        <div class="field"><label>Email</label><input type="email" name="email" placeholder="若有填寫,報名成功系統會發信通知"></div>
        
        <div class="field"><label>居住縣市</label>
            <select name="city" required>
                <option value="">請點選</option><option>北北基</option><option>桃竹苗</option><option>中彰投</option>
                <option>雲嘉南</option><option>高屏</option><option>宜花東離島</option><option>海外</option>
            </select>
        </div>

        <div class="field"><label>年齡區間</label>
            <select name="age" required>
                <option value="">請點選</option><option>2001-2010</option><option>1991-2000</option><option>1981-1990</option>
                <option>1971-1980</option><option>1961-1970</option><option>1960以前</option>
            </select>
        </div>

        <div class="field"><label>身分別</label>
            <select name="identity" required>
                <option value="">請點選</option><option>上班族</option><option>老闆</option><option>自由業</option><option>家庭主婦</option><option>退休人士</option><option>其它</option>
            </select>
        </div>

        <div class="field"><label>繳費方式</label>
            <select name="payMethod" required id="payMethod" onchange="document.getElementById('proxyWrap').style.display=(this.value.includes('他人')?'block':'none')">
                <option value="">請點選</option><option>由我本人Linepay繳費</option><option>請他人代繳</option>
            </select>
        </div>
        
        <div style="color: #f39c12; font-size: 1rem; font-weight: 900; background: #fffbe6; border: none; padding: 12px; border-radius: 12px; margin-top: -10px; margin-bottom: 20px; line-height: 1.6;">
            👤 收費窗口：杜俊傑<br>
            🆔 LineID：geoffry0306 <br>
            📞 電話搜尋：0912234429
        </div>

        <div id="proxyWrap" class="field" style="display:none">
            <label style="color: orange;">代繳人姓名</label>
            <input type="text" name="payProxyName" style="color: orange; border-color: orange;">
        </div>

        <div class="price-display" id="priceDisplay">請先點選<br>報名的課程海報</div>

        <button type="button" class="submit-btn" id="sBtn" onclick="sendToGAS()">送出報名+取得ZOOM直播號碼</button>
    </form>
</div>

<!-- 成功視窗 -->
<div id="modal">
    <div class="m-card animate__animated animate__zoomIn">
        <div style="text-align:right; font-size:30px; cursor:pointer; font-weight:bold;" onclick="location.reload()">✕</div>
        <p class="m-title">🎉 報名完成 🎉</p>
        <p id="mTime" class="m-time"></p>
        
        <div class="m-yellow-box">請截圖此畫面備份</div>
        
        <div id="summary"></div>
        
        <div class="m-dashed"></div>
        
        <div class="m-zoom-box">
            💎直播間Zoom ID<br>
            <span style="font-size:1.8rem;">688 688 1985</span><br>
            （密碼 688）
        </div>

        <!-- 更改後的複製按鈕 -->
        <button type="button" class="copy-btn" onclick="copyReminderText()">複製以上提醒文字</button>
    </div>
</div>

<script>
    let selected = [];
    let currentPayload = {}; // 儲存最後一次成功的資料供複製使用
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyloFrzmFrx_kwsIFXHfpb8OmSIFeXAcdcKnsLu0XYmK_vcuQ6gP0NKMyD-k0vBk2U/exec"; 

    function toggleDate(d) {
        if(selected.includes(d)) selected = selected.filter(x=>x!==d); else selected.push(d);
        document.getElementById('card320').classList.toggle('selected', selected.includes('3/20'));
        document.getElementById('card321').classList.toggle('selected', selected.includes('3/21'));
        
        if(selected.length === 0) {
            document.getElementById('priceDisplay').innerText = "請先點選\n報名的課程海報";
        } else {
            document.getElementById('priceDisplay').innerText = "應繳金額 " + (selected.length * 100) + " 元";
        }
        
        const b = document.body; b.className = '';
        if(selected.length==2) b.classList.add('theme-both');
        else if(selected.includes('3/20')) b.classList.add('theme-320');
        else if(selected.includes('3/21')) b.classList.add('theme-321');
    }

    async function sendToGAS() {
        if(selected.length===0) return alert('請先點選海報選擇課程！');
        const f = document.getElementById('regForm');
        if(!f.name.value) return alert('姓名為必填欄位（登入Zoom直播間的名稱）');

        const btn = document.getElementById('sBtn');
        btn.disabled = true; btn.innerText = "傳送中...請勿關閉";

        currentPayload = {
            name: f.name.value, gender: f.gender.value, referrer: f.referrer.value,
            email: f.email.value, city: f.city.value, age: f.age.value,
            identity: f.identity.value, payMethod: f.payMethod.value,
            payProxyName: f.payProxyName.value, dates: selected.join(','), amount: selected.length*100
        };

        try {
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(currentPayload) });
            showSuccess(currentPayload);
        } catch (err) {
            alert('發送失敗：' + err);
            btn.disabled = false; btn.innerText = "重新送出";
        }
    }

    function showSuccess(d) {
        document.getElementById('mTime').innerText = new Date().toLocaleString();
        
        let liveTimeStr = "";
        if(d.dates.includes('3/20')) liveTimeStr += "3/20 (五) 19:00 - 21:30<br>";
        if(d.dates.includes('3/21')) liveTimeStr += "3/21 (六) 19:00 - 21:00";

        document.getElementById('summary').innerHTML = `
            <div class="m-data-row">姓名：${d.name}</div>
            <div class="m-data-row">Email：${d.email || ''}</div>
            <div class="m-data-row">金額：${d.amount}元</div>
            <div class="m-data-row">直播時間：</div>
            <div class="m-data-row m-blue-time">${liveTimeStr}</div>
        `;
        
        document.getElementById('modal').style.display = 'block';
        window.scrollTo(0,0);
    }

function copyReminderText() {
    let dateText = "";
    const d = currentPayload.dates || "";
    if(d.includes('3/20') && d.includes('3/21')) dateText = "3/20(五)19:00\n3/21(六)19:00";
    else if(d.includes('3/20')) dateText = "3/20(五)19:00";
    else if(d.includes('3/21')) dateText = "3/21(六)19:00";

    // 使用 \n 來達成真正的強迫換行
    const textToCopy = `我已報名完成！\n${dateText}
\n請記得儘速linepay繳費
會議當天18:45即可開放入場等候審核。
若等候超過5分鐘都沒有被准入，請退出zoom，再次確認您ZOOM的登入姓名，是否有與報名表單相同。\n

💎直播間Zoom ID：688 688 1985（密碼 688）`;

    const dummy = document.createElement("textarea");
    document.body.appendChild(dummy);
    dummy.value = textToCopy;
    dummy.select();
    dummy.setSelectionRange(0, 99999); 
    
    try {
        document.execCommand("copy");
        alert("複製完成，請到Line對話框貼上發送給自己，或貼到備忘錄或行事曆！");
    } catch (err) {
        alert("複製失敗。");
    }
    document.body.removeChild(dummy);
}
</script>
</body>
</html>
